<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Widget</title>
    <style>
        :root {
            --bg-color: #000000; /* Pure black */
            --text-main: #ffffff;
            --text-sub: #8e8e93;
            --positive: #34c759;
            --negative: #ff3b30;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            margin: 0;
            font-family: var(--font-family);
            overflow: hidden;
            box-sizing: border-box;
        }

        .widget {
            width: 100vh;
            height: 100vh;
            background-color: var(--bg-color);
            border-radius: 0px;
            padding: 8vh 8vh 8vh 8vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            border: 0px solid rgba(255, 255, 255, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            z-index: 2;
        }

        .company-info, .price-info {
            display: flex;
            flex-direction: column;
        }

        .price-info {
            text-align: right;
        }

        .ticker {
            color: var(--text-main);
            font-size: 6.4vh;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 1.5vh;
        }

        .indicator {
            font-size: 5.6vh;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .company-name {
            color: var(--text-sub);
            font-size: 4.8vh;
            font-weight: 500;
            margin-top: 1.2vh;
        }

        .change-amount, .change-percent {
            font-size: 5.6vh;
            font-weight: 600;
        }

        .change-percent {
            margin-top: 1.2vh;
        }

        .chart-container {
            position: absolute;
            top: 30vh;
            left: 0;
            width: 100%;
            height: 42vh;
            z-index: 1;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .current-price {
            color: var(--text-main);
            font-size: 15vh;
            font-weight: 400;
            text-align: center;
            z-index: 2;
            margin-bottom: 0;
            line-height: 1;
            /* Physically translates the text downward */
            transform: translateY(1.5vh);
            letter-spacing: -0.3vh;
        }

        .up .ticker, .up .change-amount, .up .change-percent, .up .indicator {
            color: var(--positive);
        }

        .down .ticker, .down .change-amount, .down .change-percent, .down .indicator {
            color: var(--negative);
        }
    </style>
</head>
<body>

<div class="widget" id="stockWidget">
    <div class="header">
        <div class="company-info">
            <div class="ticker">
                <span class="indicator" id="indicator">▲</span>
                <span id="symbol">AAPL</span>
            </div>
            <div class="company-name" id="companyName">Apple Inc.</div>
        </div>
        <div class="price-info">
            <div class="change-amount" id="changeAmount">--</div>
            <div class="change-percent" id="changePercent">--</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="stockChart"></canvas>
    </div>

    <div class="current-price" id="currentPrice">--</div>
</div>

<script>
    const API_KEY = 'T3IGKOL49HD24XX0';
    const SYMBOL = 'AAPL';

    const companyNames = {
        'AAPL': 'Apple Inc.',
        'IBM': 'IBM Corp.',
        'MSFT': 'Microsoft Corp.',
        'GOOGL': 'Alphabet Inc.'
    };

    async function fetchStockData() {
        const url = `https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${SYMBOL}&apikey=${API_KEY}`;

        try {
            const response = await fetch(url);
            const data = await response.json();

            if (data['Note'] || data['Information']) {
                console.error("API Rate limit reached or invalid key.", data);
                document.getElementById('currentPrice').innerText = "ERR";
                return;
            }

            const timeSeries = data['Time Series (Daily)'];
            const dates = Object.keys(timeSeries);

            const latestDate = dates[0];
            const prevDate = dates[1];

            const latestClose = parseFloat(timeSeries[latestDate]['4. close']);
            const prevClose = parseFloat(timeSeries[prevDate]['4. close']);

            const change = latestClose - prevClose;
            const percentChange = (change / prevClose) * 100;

            const chartData = dates.slice(0, 30).map(date => parseFloat(timeSeries[date]['4. close'])).reverse();

            updateUI(latestClose, change, percentChange, chartData, prevClose);

        } catch (error) {
            console.error("Error fetching data:", error);
        }
    }

    function updateUI(price, change, percent, chartData, prevClose) {
        const widget = document.getElementById('stockWidget');
        const isPositive = change >= 0;

        widget.className = `widget ${isPositive ? 'up' : 'down'}`;

        document.getElementById('symbol').innerText = SYMBOL;
        document.getElementById('companyName').innerText = companyNames[SYMBOL] || SYMBOL;
        const upArrow = `<svg width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor" style="display: block;"><path d="M12 2L24 22H0L12 2Z"/></svg>`;
        const downArrow = `<svg width="1em" height="1em" viewBox="0 0 24 24" fill="currentColor" style="display: block;"><path d="M12 22L0 2H24L12 22Z"/></svg>`;
        document.getElementById('indicator').innerHTML = isPositive ? upArrow : downArrow;
        document.getElementById('changeAmount').innerText = `${isPositive ? '+' : ''}${change.toFixed(2)}`;
        document.getElementById('changePercent').innerText = `${isPositive ? '+' : ''}${percent.toFixed(2)}%`;
        document.getElementById('currentPrice').innerText = price.toFixed(2);

        drawChart(chartData, prevClose, isPositive);
    }

    function drawChart(data, baselinePrice, isPositive) {
        const canvas = document.getElementById('stockChart');
        const ctx = canvas.getContext('2d');

        canvas.width = canvas.offsetWidth * window.devicePixelRatio;
        canvas.height = canvas.offsetHeight * window.devicePixelRatio;
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

        const width = canvas.offsetWidth;
        const height = canvas.offsetHeight;

        const minPrice = Math.min(...data, baselinePrice);
        const maxPrice = Math.max(...data, baselinePrice);
        const padding = height * 0.15; // Proportional padding so graph line stays readable

        const getX = (index) => (index / (data.length - 1)) * width;
        const getY = (price) => height - padding - ((price - minPrice) / (maxPrice - minPrice)) * (height - padding * 2);

        // 1. Draw Baseline (Previous Close)
        const baselineY = getY(baselinePrice);
        ctx.beginPath();
        ctx.setLineDash([4, 4]);
        ctx.moveTo(0, baselineY);
        ctx.lineTo(width, baselineY);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.setLineDash([]);

        // 2. Draw Fill Gradient
        ctx.beginPath();
        ctx.moveTo(getX(0), getY(data[0]));
        for (let i = 1; i < data.length; i++) {
            ctx.lineTo(getX(i), getY(data[i]));
        }
        ctx.lineTo(width, height);
        ctx.lineTo(0, height);
        ctx.closePath();

        // Anchor the top of the gradient to the highest point of the graph for maximum visibility
        const topY = getY(maxPrice);
        const gradient = ctx.createLinearGradient(0, topY, 0, height);

        if (isPositive) {
            gradient.addColorStop(0, 'rgba(52, 199, 89, 0.6)'); // 60% opacity Green
        } else {
            gradient.addColorStop(0, 'rgba(255, 59, 48, 0.6)'); // 60% opacity Red
        }
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)'); // Fades cleanly to transparent

        ctx.fillStyle = gradient;
        ctx.fill();

        // 3. Draw Chart Line
        ctx.beginPath();
        ctx.moveTo(getX(0), getY(data[0]));
        for (let i = 1; i < data.length; i++) {
            ctx.lineTo(getX(i), getY(data[i]));
        }
        ctx.strokeStyle = isPositive ? '#34c759' : '#ff3b30';
        ctx.lineWidth = 2.5;
        ctx.lineJoin = 'round';
        ctx.stroke();
    }

    // Initial load
    fetchStockData();

    const TWO_HOURS_IN_MS = 4 * 60 * 60 * 1000;
    setInterval(fetchStockData, TWO_HOURS_IN_MS);
</script>

</body>
</html>
