<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battery</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-main: #ffffff;
            --text-muted: #74797e;
            --color-charging: #4ade80;
            --color-discharging: #f87171;
            --grid-line: #22252a;
        }

        @font-face {
            font-family: 'GoogleSansFlex';
            src: url('assets/GoogleSansFlex.ttf') format('truetype');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'GoogleSansFlex', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-variation-settings: 'ROND' 100;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .widget-container {
            width: 100vmin;
            height: 100vmin;
            max-width: 100vw;
            max-height: 100vh;
            background-color: var(--bg-color);
            padding: 6vmin;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: var(--text-main);
            border-radius: 2vmin;
            box-shadow: 0 2vmin 6vmin rgba(0,0,0,0.5);
            user-select: none;
        }

        /* Header Section */
        .header {
            display: flex;
            align-items: center;
            gap: 1.5vmin;
        }

        .icon-lightning {
            width: 4vmin;
            height: 4vmin;
            fill: currentColor;
        }

        .wireless-tag {
            font-size: 3.75vmin;
            font-weight: 800;
            letter-spacing: 0.1vmin;
            text-transform: uppercase;
        }

        /* Large Percentage Display */
        .percentage-display {
            margin-top: -1vmin;
        }

        .percentage {
            font-size: 20vmin;
            font-weight: 500;
            line-height: 1;
        }

        .label-battery {
            color: var(--text-muted);
            font-size: 2.75vmin;
            font-weight: 700;
            letter-spacing: 0.1vmin;
            margin-top: 0.25vmin;
            text-transform: uppercase;
        }

        /* Divider lines */
        .divider {
            border: none;
            border-top: 0.25vmin solid var(--grid-line);
            margin: 0.5vmin 0;
        }

        /* Stats Grid (Voltage, Temp, Health) */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr auto 1.1fr auto 1fr;
            align-items: center;
            text-align: left;
        }

        .stat-box {
            display: flex;
            flex-direction: column;
        }

        .stat-box.center {
            padding-left: 3.75vmin;
        }

        .stat-box.right {
            padding-left: 3.75vmin;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 2.5vmin;
            font-weight: 700;
            letter-spacing: 0.1vmin;
            text-transform: uppercase;
            margin-bottom: 0.5vmin;
        }

        .stat-value {
            font-size: 4vmin;
            font-weight: 700;
        }

        .v-separator {
            width: 0.25vmin;
            height: 6vmin;
            background-color: var(--grid-line);
        }

        /* Current and Graph Section */
        .graph-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 1.5vmin;
        }

        .label-current {
            color: var(--text-muted);
            font-size: 2.75vmin;
            font-weight: 700;
            letter-spacing: 0.1vmin;
        }

        /* Semantic state classes applied dynamically via JS */
        .color-charging {
            color: var(--color-charging);
        }

        .color-discharging {
            color: var(--color-discharging);
        }

        .current-value {
            font-size: 3.5vmin;
            font-weight: 700;
        }

        .current-duration {
            color: var(--text-muted);
            font-weight: 400;
            font-size: 3.25vmin;
            margin-left: 0.5vmin;
        }

        .graph-wrapper {
            position: relative;
            width: 100%;
            height: 22.5vmin;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Footer Section */
        .footer {
            font-size: 3.25vmin;
            font-weight: 700;
            letter-spacing: 0.05vmin;
            margin-top: 1vmin;
        }

        .label-capacity {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 3vmin;
            margin-right: 1vmin;
        }
    </style>
</head>
<body>

<div class="widget-container">
    <div class="header">
        <svg class="icon-lightning" viewBox="0 0 24 24">
            <path d="M19 9h-6l3-7L5 15h6l-3 7z"/>
        </svg>
        <span id="powerSource" class="wireless-tag">WIRELESS</span>
    </div>

    <div class="percentage-display">
        <div id="batteryLevel" class="percentage">85%</div>
        <div class="label-battery">Battery</div>
    </div>

    <hr class="divider">

    <div class="stats-grid">
        <div class="stat-box">
            <span class="stat-label">Voltage</span>
            <span id="voltage" class="stat-value">4.15V</span>
        </div>
        <div class="v-separator"></div>
        <div class="stat-box center">
            <span class="stat-label">Temp.</span>
            <span id="temp" class="stat-value">26.3°C</span>
        </div>
        <div class="v-separator"></div>
        <div class="stat-box right">
            <span class="stat-label">Health</span>
            <span id="health" class="stat-value">GOOD</span>
        </div>
    </div>

    <hr class="divider">

    <div class="graph-header">
        <span class="label-current">CURRENT</span>
        <span class="current-value"><span id="currentmA">-240 mA</span> <span class="current-duration">(60m)</span></span>
    </div>

    <div class="graph-wrapper">
        <canvas id="graphCanvas"></canvas>
    </div>

    <div class="footer">
        <span class="label-capacity">Capacity</span> <span id="capacity">3720 mAh / 4380 mAh</span>
    </div>
</div>

<script>
    // Android Health Mapping Constant
    const HEALTH_MAP = {
        1: "UNKNOWN",
        2: "GOOD",
        3: "OVERHEAT",
        4: "DEAD",
        5: "OVER VOLTAGE",
        6: "FAILURE",
        7: "COLD"
    };

    var MAX_HISTORICAL_POINTS = 30; // Max horizontal timeline resolution points
    var FIXED_MAX_CAPACITY = 4700;   // Matches original baseline max design spec capacity

    let telemetryHistory = [];
    let currentlyPluggedIn = false; // Tracks live power state

    const rootStyles = getComputedStyle(document.documentElement);
    let colorCharging = rootStyles.getPropertyValue('--color-charging').trim();
    let colorDischarging = rootStyles.getPropertyValue('--color-discharging').trim();
    let colorGrid = rootStyles.getPropertyValue('--grid-line').trim();
    let colorTextMuted = rootStyles.getPropertyValue('--text-muted').trim();

    window.onCustomizationChanged = (changes) => {
        if (changes.MAX_HISTORICAL_POINTS !== undefined) {
            MAX_HISTORICAL_POINTS = changes.MAX_HISTORICAL_POINTS;
            // Trim history if it's now too long
            while (telemetryHistory.length > MAX_HISTORICAL_POINTS) {
                telemetryHistory.shift();
            }
        }
        if (changes.FIXED_MAX_CAPACITY !== undefined) {
            FIXED_MAX_CAPACITY = changes.FIXED_MAX_CAPACITY;
        }
        colorCharging = rootStyles.getPropertyValue('--color-charging').trim();
        colorDischarging = rootStyles.getPropertyValue('--color-discharging').trim();
        colorGrid = rootStyles.getPropertyValue('--grid-line').trim();
        colorTextMuted = rootStyles.getPropertyValue('--text-muted').trim();

        updateBatteryDashboard();
    };

    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');

    let width, height, rightLabelWidth, graphWidth, zeroY;

    function handleResize() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();

        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        width = rect.width;
        height = rect.height;
        rightLabelWidth = width * 0.15;
        graphWidth = width - rightLabelWidth;
        zeroY = height * 0.5;

        renderTelemetryGraph();
    }

    window.addEventListener('resize', handleResize);
    handleResize();

    for (let i = 0; i < MAX_HISTORICAL_POINTS; i++) {
        telemetryHistory.push(0);
    }

    function updateBatteryDashboard() {
        let batteryLevel = 85;
        let source = "WIRELESS";
        let temp = 26.3;
        let current = -240;
        let voltageV = "4.15V";
        let healthLabel = "GOOD";
        let chargeCount = 3720;

        if (window.AndroidSensors) {
            try {
                const levelRes = JSON.parse(window.AndroidSensors.getBatteryLevel());
                const charging = JSON.parse(window.AndroidSensors.getChargingStatus());
                const stats = JSON.parse(window.AndroidSensors.getBatteryStats());

                batteryLevel = levelRes.level;
                source = charging.source ? charging.source.toUpperCase() : "BATTERY";
                currentlyPluggedIn = charging.isCharging;
                temp = charging.temp;
                current = stats.current;
                voltageV = `${(stats.voltage / 1000).toFixed(2)}V`;
                healthLabel = HEALTH_MAP[stats.health] || "UNKNOWN";
                chargeCount = stats.chargeCount;
            } catch (error) {
                console.error("Failed parsing Android native JSON context data:", error);
            }
        } else {
            current = Math.floor(Math.sin(Date.now() / 8000) * 600 + (Math.random() * 40 - 20));
            currentlyPluggedIn = current > 0;
            source = currentlyPluggedIn ? "AC POWER" : "NONE";
            chargeCount = Math.max(1000, 3720 + Math.floor(Math.sin(Date.now() / 10000) * 50));
        }

        telemetryHistory.push(current);
        if (telemetryHistory.length > MAX_HISTORICAL_POINTS) {
            telemetryHistory.shift();
        }
        const currentContainer = document.getElementById('currentmA').parentElement;
        const powerSourceEl = document.getElementById('powerSource');
        const headerEl = document.querySelector('.header');

        if (currentlyPluggedIn) {
            currentContainer.className = "current-value color-charging";
            headerEl.className = "header color-charging";
        } else {
            currentContainer.className = "current-value color-discharging";
            headerEl.className = "header color-discharging";
        }

        document.getElementById('powerSource').innerText = source === "NONE" ? "DISCHARGING" : source;
        document.getElementById('batteryLevel').innerText = `${batteryLevel}%`;
        document.getElementById('voltage').innerText = voltageV;
        document.getElementById('temp').innerText = `${temp.toFixed(1)}°C`;
        document.getElementById('health').innerText = healthLabel;
        document.getElementById('currentmA').innerText = current > 0 ? `+${current} mA` : `${current} mA`;
        document.getElementById('capacity').innerText = `${chargeCount} mAh / ${FIXED_MAX_CAPACITY} mAh`;

        renderTelemetryGraph();
    }

    function renderTelemetryGraph() {
        ctx.clearRect(0, 0, width, height);
        // TODO: make this adjust itself based on past data points
        let maxAbsoluteCurrent = 100;
        for (let i = 0; i < telemetryHistory.length; i++) {
            const absVal = Math.abs(telemetryHistory[i]);
            if (absVal > maxAbsoluteCurrent) {
                maxAbsoluteCurrent = absVal;
            }
        }
        const currentYScaleBound = Math.ceil(maxAbsoluteCurrent * 1.15);

        ctx.strokeStyle = colorGrid;
        ctx.lineWidth = Math.max(1, height * 0.01);
        const colWidth = graphWidth / 4;
        for (let i = 1; i < 4; i++) {
            ctx.beginPath();
            ctx.moveTo(i * colWidth, 0);
            ctx.lineTo(i * colWidth, height);
            ctx.stroke();
        }

        ctx.save();
        ctx.setLineDash([Math.max(1, height * 0.03), Math.max(1, height * 0.03)]);
        ctx.beginPath();
        ctx.moveTo(0, zeroY);
        ctx.lineTo(graphWidth, zeroY);
        ctx.stroke();
        ctx.restore();

        ctx.fillStyle = colorTextMuted;
        ctx.font = `${height * 0.11}px 'GoogleSansFlex', sans-serif`;
        ctx.textAlign = 'left';
        ctx.fillText(`+${currentYScaleBound}mA`, graphWidth + width * 0.01, height * 0.12);
        ctx.fillText('0', graphWidth + width * 0.01, zeroY + height * 0.04);
        ctx.fillText(`-${currentYScaleBound}mA`, graphWidth + width * 0.01, height - height * 0.05);

        const linePoints = [];
        const stepX = graphWidth / (telemetryHistory.length - 1);

        for (let i = 0; i < telemetryHistory.length; i++) {
            const val = telemetryHistory[i];
            const ratioY = val / currentYScaleBound;
            const targetY = zeroY - (ratioY * (height * 0.42));
            linePoints.push({ x: i * stepX, y: targetY });
        }

        if(linePoints.length === 0) return;

        const drawSmoothPath = (pts) => {
            if (pts.length < 2) return;
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length - 1; i++) {
                const xc = (pts[i].x + pts[i + 1].x) / 2;
                const yc = (pts[i].y + pts[i + 1].y) / 2;
                ctx.quadraticCurveTo(pts[i].x, pts[i].y, xc, yc);
            }
            ctx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
        };

        const fillGrd = ctx.createLinearGradient(0, 0, 0, height);
        const fillAlpha = (color) => {
            if (color.startsWith('#')) {
                return `rgba(${parseInt(color.slice(1,3), 16)}, ${parseInt(color.slice(3,5), 16)}, ${parseInt(color.slice(5,7), 16)}, 0.15)`;
            }
            return color;
        };

        fillGrd.addColorStop(0, fillAlpha(colorTextMuted));
        fillGrd.addColorStop(1, 'rgba(0,0,0,0)');

        ctx.beginPath();
        drawSmoothPath(linePoints);
        ctx.lineTo(linePoints[linePoints.length - 1].x, height);
        ctx.lineTo(0, height);
        ctx.closePath();
        ctx.fillStyle = fillGrd;
        ctx.fill();

        // Target Line Draw
        ctx.strokeStyle = colorTextMuted;
        ctx.lineWidth = Math.max(2, height * 0.02);
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.beginPath();
        drawSmoothPath(linePoints);
        ctx.stroke();

        const drawDot = (pt, color) => {
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, height * 0.04, 0, 2 * Math.PI);
            ctx.fillStyle = color;
            ctx.fill();
        };

        // Draw dots at state transitions (Charging <-> Discharging)
        for (let i = 1; i < telemetryHistory.length; i++) {
            const isCharging = telemetryHistory[i] > 0;
            const wasCharging = telemetryHistory[i - 1] > 0;

            if (isCharging !== wasCharging) {
                // Calculate the smoothed Y position to ensure the dot sits exactly on the Bezier curve
                const pPrev = linePoints[i - 1];
                const pCurr = linePoints[i];
                const pNext = linePoints[i + 1] || pCurr;

                let smoothedY;
                if (i === 1) {
                    // First smoothed segment starts at pts[0]
                    const t = 2 - Math.sqrt(2);
                    smoothedY = Math.pow(1 - t, 2) * pPrev.y + 2 * (1 - t) * t * pCurr.y + Math.pow(t, 2) * (pCurr.y + pNext.y) / 2;
                } else if (i === linePoints.length - 1) {
                    smoothedY = pCurr.y;
                } else {
                    smoothedY = 0.125 * pPrev.y + 0.75 * pCurr.y + 0.125 * pNext.y;
                }

                drawDot({ x: pCurr.x, y: smoothedY }, isCharging ? colorCharging : colorDischarging);
            }
        }
    }

    updateBatteryDashboard();

    setInterval(updateBatteryDashboard, 1000);
</script>
</body>
</html>
